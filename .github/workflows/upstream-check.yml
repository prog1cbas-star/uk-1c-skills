name: upstream-check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  upstream-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest PyYAML
      - name: Update upstream
        run: python build/apply.py update-upstream
      - name: Check patches
        run: python build/apply.py apply-patches
      - name: Build
        run: python build/apply.py build
      - name: Validate
        run: python build/apply.py validate
      - name: Tests
        run: python -m pytest
