_configuration_xml_feature_registry:
  StandaloneConfigurationRestrictionRoles:
    introduced_in: "8.3.16"
    xml_element: "<StandaloneConfigurationRestrictionRoles/>"
    description: "Роли ограничения автономной конфигурации"

  InternalInfoContainedObject7:
    introduced_in: "8.3.17"
    xml_element: "7-й xr:ContainedObject в InternalInfo"
    class_id: "fb282519-d103-4dd3-bc12-cb271d631dfc"
    description: "Дополнительный contained object в InternalInfo"

  URLExternalDataStorage:
    introduced_in: "8.3.18"
    xml_element: "<URLExternalDataStorage/>"
    description: "URL внешнего хранилища данных"

  MobileApplicationURLs:
    introduced_in: "8.3.18"
    xml_element: "<MobileApplicationURLs/>"
    description: "URL мобильных приложений"

  DefaultReportAppearanceTemplate:
    introduced_in: "8.3.20"
    xml_element: "<DefaultReportAppearanceTemplate/>"
    description: "Шаблон оформления отчётов по умолчанию"

  AllowedIncomingShareRequestTypes:
    introduced_in: "8.3.20"
    xml_element: "<AllowedIncomingShareRequestTypes/>"
    description: "Разрешённые типы входящих share-запросов"

  DatabaseTablespacesUseMode:
    introduced_in: "8.3.20"
    xml_element: "<DatabaseTablespacesUseMode>DontUse</DatabaseTablespacesUseMode>"
    description: "Режим использования tablespaces базы данных"
